name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Buoy ${{ github.ref_name }}'
          releaseBody: |
            Keep your bots running. Without the terminal.

            Buoy handles starting, stopping, monitoring, and auto-restarting your bots so you can focus on writing code.

            ## Quickstart
            1. Download the `.msi` installer below
            2. Install and launch Buoy
            3. Click **Add Bot**, point to your project folder, and hit **Start**

            ## What's Included
            - `.msi` installer — standard Windows install
            - `.exe` (NSIS) — single-file portable installer

            Full details at [github.com/newt-dev-sudo/Buoy](https://github.com/newt-dev-sudo/Buoy).
          releaseDraft: true
          prerelease: false
          args: '--target x86_64-pc-windows-msvc'
